# Reverse Proxy Configuration Example
# All fields shown with their default values where applicable.

server:
  # Default listen address (used when no listeners are defined).
  # When listeners are configured, this field is ignored.
  listen: ":8080"

  # Optional server-level TLS (applied to the default listener only).
  # When using named listeners, configure TLS per-listener instead.
  # tls:
  #   enabled: true
  #   cert_file: "/path/to/cert.pem"
  #   key_file: "/path/to/key.pem"

  # Transport settings control connection pooling and dial timeouts.
  # These apply to all proxy types (HTTP, WS, TCP, gRPC, UDP, RPC, Socket).
  transport:
    max_idle_conns: 512          # Maximum total idle connections (HTTP)
    max_idle_conns_per_host: 64  # Maximum idle connections per backend host (HTTP)
    idle_conn_timeout: "90s"     # How long idle connections stay open (HTTP)
  dial_timeout: "10s" # Timeout for dialing backend connections (all protocols)

  # UDP-specific settings for session management.
  udp:
    max_sessions: 10000 # Maximum concurrent UDP sessions (0 = unlimited)
    dial_timeout: "10s" # Timeout for dialing UDP backends
    session_timeout: "30s" # Idle timeout for UDP sessions

  # Multiple protocol listeners.
  # Each listener can serve a different protocol (http, websocket, tcp, grpc, socket, udp, rpc)
  # on its own address with its own routes and optional TLS.
  listeners:
    # --- HTTP listener with route-based routing ---
    - name: "http-proxy"
      protocol: "http" # http | websocket | tcp | grpc | socket | udp | rpc
      listen: ":8080"
      # tls:
      #   enabled: true
      #   cert_file: "/path/to/cert.pem"
      #   key_file: "/path/to/key.pem"
      routes:
        - match: "/api/" # Path prefix match
          backend_pool: "web-backend"
        - match: "/static/" # Path prefix match
          backend_pool: "static-backend"

    # --- WebSocket listener ---
    - name: "ws-proxy"
      protocol: "websocket"
      listen: ":8081"
      routes:
        - match: "/ws/"
          backend_pool: "ws-backend"

    # --- Raw TCP listener (no routes, uses backend_pool directly) ---
    - name: "tcp-proxy"
      protocol: "tcp"
      listen: ":3306"
      backend_pool: "db-backend" # Required for tcp/grpc listeners

    # --- gRPC listener ---
    - name: "grpc-proxy"
      protocol: "grpc"
      listen: ":50051"
      backend_pool: "grpc-backend" # Required for tcp/grpc listeners

    # --- Unix Domain Socket listener ---
    - name: "socket-proxy"
      protocol: "socket"
      listen: "/var/run/backend.sock" # Unix socket path
      backend_pool: "socket-backend"

    # --- UDP listener ---
    - name: "udp-proxy"
      protocol: "udp"
      listen: ":8125"
      backend_pool: "udp-backend"

    # --- JSON-RPC listener ---
    - name: "rpc-proxy"
      protocol: "rpc"
      listen: ":9000"
      backend_pool: "rpc-backend"

# Backend pool definitions.
# Each pool groups backends that share a load-balancing strategy
# and optional health check configuration.
backend_pools:
  # --- Round-robin pool with health checks ---
  - name: "web-backend"
    balancer: "round_robin" # round_robin | weighted_round_robin | least_connections | random
    health_check:
      enabled: true
      interval: "10s" # Duration between checks (default: 10s)
      timeout: "5s" # Per-check timeout (default: 5s)
      path: "/health" # HTTP path for health check; empty for TCP (connection test)
      unhealthy_threshold: 3 # Consecutive failures before marking unhealthy (default: 3)
      healthy_threshold: 2 # Consecutive successes before marking healthy (default: 2)
    backends:
      - url: "http://127.0.0.1:8001"
        weight: 1 # Default: 1; used by weighted_round_robin
      - url: "http://127.0.0.1:8002"
        weight: 1
      - url: "http://127.0.0.1:8003"
        weight: 1

  # --- Weighted round-robin pool ---
  - name: "static-backend"
    balancer: "weighted_round_robin"
    health_check:
      enabled: true
      interval: "30s"
      timeout: "3s"
      path: "/health"
      unhealthy_threshold: 3
      healthy_threshold: 2
    backends:
      - url: "http://127.0.0.1:9001"
        weight: 5 # Receives ~5x more traffic than weight-1
      - url: "http://127.0.0.1:9002"
        weight: 3
      - url: "http://127.0.0.1:9003"
        weight: 1

  # --- Least-connections pool (no health checks) ---
  - name: "ws-backend"
    balancer: "least_connections"
    health_check:
      enabled: false
    backends:
      - url: "ws://127.0.0.1:7001"
      - url: "ws://127.0.0.1:7002"

  # --- Random pool with TCP health check (connection test) ---
  - name: "db-backend"
    balancer: "random"
    health_check:
      enabled: true
      interval: "15s"
      timeout: "3s"
      path: "" # Empty path: TCP health check (dial only, no HTTP)
      unhealthy_threshold: 3
      healthy_threshold: 2
    backends:
      - url: "tcp://127.0.0.1:3307"
      - url: "tcp://127.0.0.1:3308"

  # --- Round-robin pool for gRPC (no health checks) ---
  - name: "grpc-backend"
    balancer: "round_robin"
    health_check:
      enabled: false
    backends:
      - url: "grpc://127.0.0.1:50052"
      - url: "grpc://127.0.0.1:50053"

  # --- Unix Domain Socket pool ---
  - name: "socket-backend"
    balancer: "round_robin"
    health_check:
      enabled: true
      interval: "15s"
      timeout: "3s"
      # No path = Unix dial health check (connection test)
      unhealthy_threshold: 3
      healthy_threshold: 2
    backends:
      - url: "unix:/var/run/backend1.sock"
        weight: 1
      - url: "unix:/var/run/backend2.sock"
        weight: 1

  # --- UDP pool ---
  - name: "udp-backend"
    balancer: "random"
    health_check:
      enabled: false
    backends:
      - url: "udp://127.0.0.1:8126"
        weight: 1
      - url: "udp://127.0.0.1:8127"
        weight: 1

  # --- JSON-RPC pool ---
  - name: "rpc-backend"
    balancer: "least_connections"
    health_check:
      enabled: true
      interval: "15s"
      timeout: "3s"
      # No path = TCP dial health check
      unhealthy_threshold: 3
      healthy_threshold: 2
    backends:
      - url: "rpc://127.0.0.1:9001"
        weight: 1
      - url: "rpc://127.0.0.1:9002"
        weight: 1

# Rate limiting (global, applies across all listeners).
rate_limit:
  enabled: true
  requests_per_second: 100.0 # Must be > 0 when enabled
  burst: 200 # Maximum burst size (default: 200)
  per_ip: true # When true, limit per client IP; false = global limit

# Logging configuration.
logging:
  level: "info" # debug | info | warn | error
  format: "json" # json | text
  output: "stdout" # stdout | stderr
